server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # DEVSECOPS: Security Headers
    # Prevents other sites from embedding your app in an iframe (Clickjacking protection)
    add_header X-Frame-Options "SAMEORIGIN" always;
    # Prevents browsers from guessing the file type (MIME-sniffing protection)
    add_header X-Content-Type-Options "nosniff" always;
    # Enables Cross-Site Scripting (XSS) filters in the browser
    add_header X-XSS-Protection "1; mode=block" always;
    # Enforces Strict Transport Security (forces HTTPS)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    location / {
        try_files $uri $uri/ =404;
    }
}
